<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training - SmartTraffic AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-200 p-4">
    <nav class="bg-slate-900/70 border border-slate-800 rounded-2xl px-6 py-4 sticky top-4 z-50 backdrop-blur-xl shadow-2xl shadow-black/20 max-w-5xl mx-auto">
        <div class="flex flex-wrap justify-between items-center">
            <div class="flex items-center">
                <img src="/static/img/logo.png" alt="SmartTraffic AI Logo" class="h-14 w-auto rounded-lg shadow-lg shadow-cyan-500/20 border border-white/10">
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-white p-2 rounded-lg hover:bg-white/10 transition-colors">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div id="mobile-menu" class="hidden md:flex w-full md:w-auto flex-col md:flex-row items-center gap-3 mt-4 md:mt-0 transition-all duration-300">
                <a href="/dashboard" class="w-full md:w-auto justify-center px-4 py-2 bg-slate-800/50 hover:bg-slate-700 text-indigo-300 hover:text-white rounded-lg text-sm font-medium transition-all flex items-center gap-2 border border-slate-700 hover:border-indigo-500/50">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </a>
                <a href="/labeling" class="w-full md:w-auto justify-center px-4 py-2 bg-slate-800/50 hover:bg-slate-700 text-emerald-300 hover:text-white rounded-lg text-sm font-medium transition-all flex items-center gap-2 border border-slate-700 hover:border-emerald-500/50">
                    <i class="fas fa-pen-to-square"></i> Labeling
                </a>
                <a href="/training" class="w-full md:w-auto justify-center px-4 py-2 bg-purple-600/20 hover:bg-slate-700 text-purple-300 hover:text-white rounded-lg text-sm font-medium transition-all flex items-center gap-2 border border-purple-500/40 hover:border-purple-500/50">
                    <i class="fas fa-dumbbell"></i> Training
                </a>
                <a href="/documentation" class="w-full md:w-auto justify-center px-4 py-2 bg-slate-800/50 hover:bg-slate-700 text-gray-400 hover:text-white rounded-lg border border-slate-700 transition-all" title="Documentation">
                    <i class="fas fa-book"></i> <span class="md:hidden">Documentation</span>
                </a>
                <div class="w-full md:w-auto text-center md:text-right md:ml-2 md:border-l md:border-slate-700 md:pl-4 mt-2 md:mt-0">
                    <p class="text-sm font-bold text-white" id="current-time">--:--</p>
                    <p class="text-[10px] text-gray-500 uppercase tracking-wider" id="current-date">--/--/----</p>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto space-y-4 mt-6">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
                <div class="text-lg font-semibold">Training Model</div>
                <div class="text-xs text-slate-400">Train YOLOv8 dari dataset export, lalu deploy ke aplikasi</div>
            </div>
            <button id="refresh" class="px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 border border-slate-700 text-sm flex items-center gap-2">
                <i class="fas fa-rotate"></i> Refresh
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
                <div class="text-sm font-semibold">Konfigurasi</div>

                <div class="space-y-1">
                    <div class="text-xs text-slate-400">Export Dataset</div>
                    <select id="export-select" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm"></select>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-slate-950 border border-slate-800 rounded px-3 py-2">
                        <div class="text-[10px] text-slate-500">Train</div>
                        <div class="text-sm font-semibold" id="c-train">-</div>
                    </div>
                    <div class="bg-slate-950 border border-slate-800 rounded px-3 py-2">
                        <div class="text-[10px] text-slate-500">Valid</div>
                        <div class="text-sm font-semibold" id="c-valid">-</div>
                    </div>
                    <div class="bg-slate-950 border border-slate-800 rounded px-3 py-2">
                        <div class="text-[10px] text-slate-500">Test</div>
                        <div class="text-sm font-semibold" id="c-test">-</div>
                    </div>
                </div>
                <div class="bg-slate-950 border border-slate-800 rounded px-3 py-2">
                    <div class="flex items-center justify-between gap-3">
                        <div class="text-xs text-slate-400">Progress</div>
                        <div class="text-xs text-slate-500" id="progress-text">-</div>
                    </div>
                    <div class="mt-2 h-2 bg-slate-900 rounded overflow-hidden">
                        <div id="progress-bar" class="h-2 bg-emerald-500/80" style="width:0%"></div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="space-y-1">
                        <div class="text-xs text-slate-400">Base</div>
                        <select id="base-model" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm">
                            <option value="yolov8n.pt">yolov8n</option>
                            <option value="yolov8s.pt">yolov8s</option>
                            <option value="yolov8m.pt">yolov8m</option>
                            <option value="yolov8l.pt">yolov8l</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <div class="text-xs text-slate-400">ImgSz</div>
                        <input id="imgsz" type="number" min="320" max="1280" value="640" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm">
                    </div>
                    <div class="space-y-1">
                        <div class="text-xs text-slate-400">Batch</div>
                        <input id="batch" type="number" min="1" max="64" value="4" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <div class="text-xs text-slate-400">Epochs</div>
                        <input id="epochs" type="number" min="1" max="500" value="80" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm">
                    </div>
                    <div class="space-y-1">
                        <div class="text-xs text-slate-400">Device</div>
                        <input value="cpu" disabled class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm text-slate-500">
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button id="start" class="flex-1 px-3 py-2 rounded bg-emerald-600 hover:bg-emerald-500 text-white text-sm">Start Training</button>
                    <button id="stop" class="px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 border border-slate-700 text-sm">Stop</button>
                </div>

                <div class="flex gap-2">
                    <button id="deploy" class="flex-1 px-3 py-2 rounded bg-purple-600 hover:bg-purple-500 text-white text-sm">Deploy Best</button>
                    <div id="status-pill" class="px-3 py-2 rounded bg-slate-950 border border-slate-800 text-xs text-slate-400 flex items-center">Idle</div>
                </div>

                <div id="hint" class="text-xs text-slate-400"></div>
                <div class="bg-slate-950 border border-slate-800 rounded px-3 py-2">
                    <div class="text-[10px] text-slate-500">Model Aktif</div>
                    <div class="text-xs text-slate-300 truncate" id="model-path">-</div>
                    <div class="text-[10px] text-slate-500 truncate" id="model-names">-</div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
                <div class="flex items-center justify-between">
                    <div class="text-sm font-semibold">Log</div>
                    <div class="text-xs text-slate-400" id="job-id"></div>
                </div>
                <pre id="log" class="bg-slate-950 border border-slate-800 rounded p-3 text-xs overflow-auto" style="max-height: 520px; white-space: pre-wrap;"></pre>
            </div>
        </div>
    </div>

    <script>
        let currentJobId = null;

        function setHint(msg) {
            document.getElementById('hint').innerText = msg || '';
        }

        function setStatus(text, cls) {
            const el = document.getElementById('status-pill');
            el.className = `px-3 py-2 rounded border text-xs flex items-center ${cls}`;
            el.innerText = text;
        }

        async function loadExportInfo() {
            const name = document.getElementById('export-select').value;
            if (!name) return;
            const resp = await fetch(`/api/labeling/export_info?name=${encodeURIComponent(name)}`, { cache: 'no-store' });
            const json = await resp.json();
            if (!json || json.status !== 'success') return;
            const c = json.counts || {};
            document.getElementById('c-train').innerText = (c.train_images ?? '-') + '';
            document.getElementById('c-valid').innerText = (c.valid_images ?? '-') + '';
            document.getElementById('c-test').innerText = (c.test_images ?? '-') + '';
        }

        async function loadModelInfo() {
            const resp = await fetch('/api/model/info', { cache: 'no-store' });
            const json = await resp.json();
            if (!json || json.status !== 'success') return;
            document.getElementById('model-path').innerText = json.model_path || '-';
            const names = (json.names || []).filter(Boolean).join(', ');
            document.getElementById('model-names').innerText = names ? `names: ${names}` : '-';
        }

        async function loadExports() {
            const resp = await fetch('/api/labeling/exports', { cache: 'no-store' });
            const json = await resp.json();
            const sel = document.getElementById('export-select');
            sel.innerHTML = '';
            if (!json || json.status !== 'success') return;
            json.items.forEach(it => {
                const opt = document.createElement('option');
                opt.value = it.name;
                opt.innerText = it.name;
                sel.appendChild(opt);
            });
            await loadExportInfo();
        }

        function parseProgress(logTail) {
            if (!logTail) return null;
            const re = /\b(\d+)\s*\/\s*(\d+)\b/g;
            let m = null;
            let last = null;
            while ((m = re.exec(logTail)) !== null) {
                const a = parseInt(m[1], 10);
                const b = parseInt(m[2], 10);
                if (b > 0 && a >= 0 && a <= b) last = { a, b };
            }
            return last;
        }

        async function refreshStatus() {
            const resp = await fetch('/api/training/status', { cache: 'no-store' });
            const json = await resp.json();
            if (!json || json.status !== 'success') return;

            const job = json.job;
            const logEl = document.getElementById('log');
            const jobEl = document.getElementById('job-id');

            if (!job) {
                currentJobId = null;
                jobEl.innerText = '';
                logEl.innerText = '';
                setStatus('Idle', 'bg-slate-950 border-slate-800 text-slate-400');
                return;
            }

            currentJobId = job.job_id;
            jobEl.innerText = job.job_id;
            logEl.innerText = job.log_tail || '';

            const prog = parseProgress(job.log_tail || '');
            if (prog) {
                const pct = Math.round((prog.a / prog.b) * 100);
                document.getElementById('progress-bar').style.width = `${pct}%`;
                document.getElementById('progress-text').innerText = `${prog.a}/${prog.b} (${pct}%)`;
            } else {
                document.getElementById('progress-bar').style.width = `0%`;
                document.getElementById('progress-text').innerText = '-';
            }

            if (job.running) {
                setStatus('Running', 'bg-emerald-950 border-emerald-800 text-emerald-300');
            } else if (job.exit_code === 0) {
                setStatus('Done', 'bg-blue-950 border-blue-800 text-blue-300');
            } else {
                setStatus('Error', 'bg-red-950 border-red-800 text-red-300');
            }

            if (job.best_exists || job.last_exists) {
                setHint('Deploy Best akan menimpa models/yolov8_mobil_motor.pt (dibackup) lalu restart service supaya kepakai.');
            }

            const deployBtn = document.getElementById('deploy');
            if (deployBtn) {
                deployBtn.disabled = !(job.best_exists || job.last_exists);
                deployBtn.className = deployBtn.disabled
                    ? 'flex-1 px-3 py-2 rounded bg-purple-600/30 text-white/40 text-sm cursor-not-allowed'
                    : 'flex-1 px-3 py-2 rounded bg-purple-600 hover:bg-purple-500 text-white text-sm';
            }
        }

        async function startTraining() {
            const exportName = document.getElementById('export-select').value;
            const baseModel = document.getElementById('base-model').value;
            const imgsz = parseInt(document.getElementById('imgsz').value || '640', 10);
            const epochs = parseInt(document.getElementById('epochs').value || '80', 10);
            const batch = parseInt(document.getElementById('batch').value || '4', 10);

            setHint('');
            const resp = await fetch('/api/training/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ export_name: exportName, base_model: baseModel, imgsz, epochs, batch })
            });
            const json = await resp.json();
            if (!json || json.status !== 'success') {
                setHint((json && json.message) ? json.message : 'Start gagal');
                return;
            }
            await refreshStatus();
        }

        async function stopTraining() {
            setHint('');
            await fetch('/api/training/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
            await refreshStatus();
        }

        async function deployBest() {
            if (!currentJobId) {
                setHint('Tidak ada job untuk deploy');
                return;
            }
            setHint('');
            const resp = await fetch('/api/training/deploy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ job_id: currentJobId })
            });
            const json = await resp.json();
            if (!json || json.status !== 'success') {
                setHint((json && json.message) ? json.message : 'Deploy gagal');
                return;
            }
            setHint(`Deploy OK: ${json.model_path}. Restart service aplikasi supaya model baru dipakai.`);
        }

        document.getElementById('start').onclick = startTraining;
        document.getElementById('stop').onclick = stopTraining;
        document.getElementById('deploy').onclick = deployBest;
        document.getElementById('refresh').onclick = async () => { await loadExports(); await refreshStatus(); };
        document.getElementById('export-select').onchange = loadExportInfo;

        loadExports().then(async () => { await refreshStatus(); await loadModelInfo(); });
        setInterval(async () => { await refreshStatus(); await loadModelInfo(); }, 2000);

        function updateClock() {
            const now = new Date();
            const t = document.getElementById('current-time');
            const d = document.getElementById('current-date');
            if (t) t.innerText = now.toLocaleTimeString();
            if (d) d.innerText = now.toLocaleDateString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        const mobileBtn = document.getElementById('mobile-menu-btn');
        if (mobileBtn) {
            mobileBtn.addEventListener('click', function() {
                const menu = document.getElementById('mobile-menu');
                if (!menu) return;
                menu.classList.toggle('hidden');
                menu.classList.toggle('flex');
            });
        }
    </script>
</body>
</html>
